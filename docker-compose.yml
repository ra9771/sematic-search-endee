version: "3.9"

services:
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    environment:
      NDD_NUM_THREADS: 0
      NDD_AUTH_TOKEN: ""          # Leave empty for no auth; set a token to enable auth
    volumes:
      - endee-data:/data
    restart: unless-stopped

volumes:
  endee-data:
